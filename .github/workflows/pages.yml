name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages artifact
        run: npm run build:pages
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_DEPLOY_VERSION: ${{ github.sha }}
          VALGARON_DEPLOY_COMMIT: ${{ github.sha }}

      - name: Verify PWA artifact
        run: node scripts/verifyPwaBuild.cjs
        env:
          VALGARON_DEPLOY_COMMIT: ${{ github.sha }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out deployment verifier
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live Pages deployment
        run: node scripts/verifyPagesDeployment.cjs
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          PAGES_URL: ${{ steps.deployment.outputs.page_url }}
